<html lang="en">
<head>

  <title>Pogemon Card Generator</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/cards.css">

<body>
  <div id="loading-bar"></div>
  <div class="container">
    <div id="cardContainer" class="card-container">
      <!-- Initial card with back side showing -->
      <div class="card show">
        <div class="card-inner flipped">
          <div class="card-front">
            <h2 class="pokemon-name">???</h2>
            <div class="card-image-container"></div>
            <div class="stats-container">
              <div class="type-wrapper">
                <div class="type-icon unknown">
                  <svg viewBox="0 0 512 512"><path fill="currentColor" d="M256 96c-88.4 0-160 71.6-160 160s71.6 160 160 160 160-71.6 160-160S344.4 96 256 96z"/></svg>
                </div>
              </div>
              <p class="pokemon-stats">??? | ???</p>
            </div>
            <div class="card-description">
              <p class="pokemon-description">Click generate to discover a new Pogemon!</p>
            </div>
          </div>
          <div class="card-back">
            <div class="card-back-design">
              <svg class="card-back-logo" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2"/>
                <circle cx="50" cy="50" r="20" fill="currentColor"/>
                <line x1="50" y1="5" x2="50" y2="95" stroke="currentColor" stroke-width="2"/>
              </svg>
              <div class="card-back-pattern"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button id="printBtn" class="print-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
      </svg>
    </button>
    <button id="generateBtn" class="generate-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
      </svg>
    </button>
  </div>
